<title>Radical Reading Co. — Palette Reference: Jade System vs Mid-Azure</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#e8e4de;padding:24px 16px;color:#0c323d;}
h1{font-size:18px;font-weight:600;color:#0c323d;margin-bottom:4px;}
.doc-sub{font-size:12px;color:#43545e;margin-bottom:28px;padding-bottom:16px;border-bottom:2px solid #018a75;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:28px;}
.pal-card{border-radius:12px;overflow:hidden;border:.5px solid #ccc;background:#fff;}
.pal-head{padding:14px 18px 10px;}
.pal-title{font-size:14px;font-weight:600;margin-bottom:3px;}
.pal-sub{font-size:11px;color:#666;line-height:1.5;}
.group{padding:10px 18px;border-top:.5px solid #e8e4de;}
.group-lbl{font-size:9px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:#888;margin-bottom:8px;}
.sw-row{display:flex;gap:6px;flex-wrap:wrap;}
.sw-wrap{display:flex;flex-direction:column;align-items:center;gap:3px;}
.sw{border-radius:6px;border:.5px solid rgba(0,0,0,.12);}
.sw-hex{font-size:9px;font-family:monospace;color:#666;}
.sw-nm{font-size:9px;color:#555;text-align:center;width:62px;line-height:1.3;}
.delta{outline:2.5px solid #0c323d;outline-offset:1px;}
.retired{outline:2px dashed #cc4444;outline-offset:1px;}
.preview{padding:10px 18px 16px;border-top:.5px solid #e8e4de;}
.prev-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-radius:8px 8px 0 0;}
.prev-hero{padding:12px 14px;}
.prev-cream{padding:12px 14px;background:#f6f4ee;border-radius:0 0 8px 8px;}
.btn{padding:5px 13px;border-radius:20px;font-size:10px;font-weight:600;cursor:default;display:inline-block;}
.card-note{font-size:10px;color:#666;line-height:1.6;padding:10px 18px 14px;border-top:.5px solid #e8e4de;font-style:italic;}
.footer-note{font-size:11px;color:#555;text-align:center;margin-top:8px;padding-top:16px;border-top:1px solid #ccc;}
.legend{display:flex;gap:16px;margin-bottom:20px;flex-wrap:wrap;align-items:center;}
.leg-item{display:flex;align-items:center;gap:6px;font-size:11px;color:#555;}
.leg-sw{width:16px;height:16px;border-radius:3px;}
</style>

    var h = '<div class="group-lbl">' + g.label + '</div><div class="sw-row">';
    g.swatches.forEach(function(s) {
      var cls = s.delta ? " delta" : s.retired ? " retired" : "";
      h += '<div class="sw-wrap">';
      h += '<div class="sw' + cls + '" style="width:52px;height:40px;background:#' + s.hex + ';' + (s.dark ? "border:.5px solid #ccc;" : "") + '"></div>';
      h += '<div class="sw-hex">#' + s.hex + '</div>';
      h += '<div class="sw-nm">' + s.name + '</div>';
      h += '</div>';
    });
    h += '</div>';
    grp.innerHTML = h;
    card.appendChild(grp);
  });

  var prev = document.createElement("div");
  prev.className = "preview";
  prev.innerHTML = '<div class="group-lbl">Preview</div>';

  var bar = document.createElement("div");
  bar.className = "prev-bar";
  bar.style.background = pal.headBg;
  var logoWrap = document.createElement("div");
  logoWrap.style.cssText = "width:110px;flex-shrink:0;";
  logoWrap.appendChild(cloneLogo(pal.logoColor, 110));
  bar.appendChild(logoWrap);
  var bw = document.createElement("div");
  bw.style.cssText = "display:flex;gap:6px;margin-left:auto;";
  bw.innerHTML = '<span class="btn" style="background:' + pal.btnPri + ';color:' + pal.btnPriText + ';">Enroll now</span>' +
                 '<span class="btn" style="background:' + pal.btnSec + ';color:' + pal.btnSecText + ';">Learn more</span>';
  bar.appendChild(bw);

  var hero = document.createElement("div");
  hero.className = "prev-hero";
  hero.style.background = pal.heroBg;
  hero.innerHTML = '<div style="font-size:13px;font-weight:600;color:#f6f4ee;margin-bottom:4px;">Wire up their brain for potential</div>' +
                   '<div style="font-size:10px;color:rgba(246,244,238,.58);line-height:1.6;">Reading science in the critical K–3 window.</div>';

  var cream = document.createElement("div");
  cream.className = "prev-cream";
  cream.innerHTML = '<div style="font-size:10px;color:#0c323d;font-weight:600;margin-bottom:3px;">The school says wait and see.</div>' +
    '<div style="font-size:10px;color:#43545e;line-height:1.5;margin-bottom:8px;">Science says act now. The neural wiring window closes at grade 3.</div>' +
    '<span style="font-size:10px;color:' + pal.linkColor + ';font-weight:500;">Start bridging reading gaps today →</span>';

  prev.appendChild(bar);
  prev.appendChild(hero);
  prev.appendChild(cream);
  card.appendChild(prev);

  var noteEl = document.createElement("div");
  noteEl.className = "card-note";
  noteEl.textContent = pal.cardNote;
  card.appendChild(noteEl);

  grid.appendChild(card);
});
</script>
</body>
</html>
